################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@60.00Hz, -1920x800, 1
monitor = HDMI-A-1, 1920x1080@74.97Hz, 0x0, 1
monitor=,preferred,auto,auto # isnt this the default anyway?

general {
    allow_tearing = true
}

###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$menu = hyprlauncher
$browser = firefox

#################
### AUTOSTART ###
#################

exec-once = hyprlauncher -d
exec-once = spotify_player -d
exec-once = hyprpolkitagent
exec-once = hyprnotify

###################
### PERMISSIONS ###
###################

# TODO - not on nixpkgs(-unstable) yet

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    follow_mouse = 2
    sensitivity = -0.5
}

cursor {
    no_hardware_cursors = true
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

dwindle {
    preserve_split = true
}

###################
### KEYBINDINGS ###
###################

bindu = SUPER, escape, submap, reset

# kill stuff
bind = SUPER, Q, killactive,
bindpr = SUPER SHIFT, Q, forcekillactive,
bindr = SUPER CTRL SHIFT, Q, exec, hyprshutdown
bindlr = SUPER CTRL, Q, exec, hyprshutdown --post-cmd 'shutdown -P 0'
bindlr = SUPER CTRL ALT, Q, exec, hyprshutdown --post-cmd 'shutdown -r 0'

# fullscreen
bind = SUPER, F, fullscreenstate, 1, 1
bind = SUPER SHIFT, F, fullscreenstate, 2 2
bind = SUPER, SPACE, exec, $menu

# move focus
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# move windows
bind = SUPER, M, submap, move_window
submap = move_window
bindi = , H, movewindow, l
bindi = , J, movewindow, d
bindi = , K, movewindow, u
bindi = , L, movewindow, r
bindi = , V, layoutmsg, togglesplit
bindi = , escape, submap, reset
submap = reset

# run
bind = SUPER, N, submap, run
submap = run, reset
bindi = , T, exec, $terminal
bindi = , N, exec, $terminal
bindi = , B, exec, $browser
submap = reset

